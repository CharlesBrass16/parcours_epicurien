services:
  web:
    build: .
    container_name: velo-epicurien-web
    ports:
      - "8080:80"
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      - mongo
      - postgres

  mongo:
    image: mongo:latest
    container_name: velo-epicurien-mongo
    ports:
      - "27017:27017"

  postgres:
    image: postgres:latest
    container_name: velo-epicurien-postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: veloepicurien
    ports:
      - "5432:5432"
