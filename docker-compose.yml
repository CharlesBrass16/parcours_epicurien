services:
  web:
    build: .
    container_name: velo-epicurien-web
    ports:
      - "8080:80"
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      - mongo
      - neo4j

  mongo:
    image: mongo:latest
    container_name: velo-epicurien-mongo
    ports:
      - "27017:27017"

  neo4j:
    image: neo4j:latest
    container_name: velo-epicurien-neo4j
    environment:
      NEO4J_AUTH: neo4j/password
    ports:
      - "7474:7474"  # Port pour l'interface web Neo4j
      - "7687:7687"  # Port pour le bolt protocol (utilisé par les drivers Neo4j)
